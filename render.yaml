services:
  - type: web
    name: asgard-backend
    runtime: python
    plan: free
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_URL
        value: https://asgard.buildwithayush.co.in
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
